version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: actuary
      POSTGRES_PASSWORD: actuary_dev
      POSTGRES_DB: iam_an_actuary
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U actuary"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ../apps/backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://actuary:actuary_dev@postgres:5432/iam_an_actuary
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-qwen3}
      QWEN3_API_KEY: ${QWEN3_API_KEY:-}
      QWEN3_API_URL: ${QWEN3_API_URL:-https://api.qwen.ai/v1}
      QWEN3_MODEL: ${QWEN3_MODEL:-qwen3}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-api-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      NEXT_PUBLIC_BACKEND_INTERNAL_URL: http://backend:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-api-key-change-in-production}
    depends_on:
      - backend

volumes:
  pgdata: